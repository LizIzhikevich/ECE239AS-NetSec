<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.css" rel="stylesheet">
  <script src="schedule-events.js"></script>
  <link href="https://fonts.googleapis.com/css?family=Fira+Sans:300,400,500,600,700" rel="stylesheet">
  <title>Schedule</title>

  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: 'Fira Sans', sans-serif;
      background: white;
    }

    #calendar {
      max-width: 100%;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 0 0 12px 0;
      font-size: 0.95rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      display: inline-block;
    }

    .fc .fc-toolbar-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .fc-event {
      cursor: pointer;
      border: none !important;
      padding: 2px 4px;
    }

    .fc-daygrid-event-dot {
      display: none;
    }

    .details-panel {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      background: #fafafa;
      font-size: 0.95rem;
    }

    .details-panel h4 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.05rem;
    }

    .details-panel ul {
      margin-bottom: 0;
      padding-left: 18px;
    }

    .details-panel li {
      margin-bottom: 4px;
    }

    @media (max-width: 768px) {
      .fc .fc-toolbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="legend">
    <div class="legend-item">
      <span class="legend-color" style="background:#2b6cb0;"></span>
      <span>Lecture</span>
    </div>
    <div class="legend-item">
      <span class="legend-color" style="background:#EAAA00;"></span>
      <span>Homework</span>
    </div>
    <div class="legend-item">
      <span class="legend-color" style="background:#dd6b20;"></span>
      <span>Project window</span>
    </div>
    <div class="legend-item">
      <span class="legend-color" style="background:#718096;"></span>
      <span>No class</span>
    </div>
  </div>

  <div id="calendar"></div>

  <div id="event-details" class="details-panel">
    <h4>Schedule details</h4>
    <p>Click an event to see details here.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.17/index.global.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const detailsEl = document.getElementById('event-details');

      const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        initialDate: '2026-03-30',
        height: 'auto',
        fixedWeekCount: false,
        navLinks: true,
        displayEventTime: false,
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,listMonth'
        },

        eventClick: function(info) {
          info.jsEvent.preventDefault();

          const props = info.event.extendedProps;
          const title = info.event.title;
          const start = info.event.start ? info.event.start.toLocaleDateString() : '';
          const end = info.event.end
            ? new Date(info.event.end.getTime() - 86400000).toLocaleDateString()
            : start;

          let html = '<h4>' + title + '</h4>';
          html += '<p><b>Date:</b> ' + start;
          if (end && end !== start) {
            html += ' &ndash; ' + end;
          }
          html += '</p>';

          if (props.type) {
            html += '<p><b>Type:</b> ' + props.type + '</p>';
          }

          if (props.description) {
            html += '<p>' + props.description + '</p>';
          }

          if (props.items && props.items.length) {
            html += '<ul>';
            props.items.forEach(function(item) {
              if (item.url) {
                html += '<li><a href="' + item.url + '" target="_blank" rel="noopener noreferrer">' + item.label + '</a></li>';
              } else {
                html += '<li>' + item.label + '</li>';
              }
            });
            html += '</ul>';
          }

          detailsEl.innerHTML = html;

          if (info.event.url) {
            window.open(info.event.url, '_blank');
          }
        },
      events: scheduleEvents
      });

      calendar.render();
    });
  </script>
</body>
</html>
