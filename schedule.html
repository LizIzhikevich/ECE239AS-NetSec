  <title>Schedule</title>

    body {
      margin: 0;
      padding: 12px;
      font-family: 'Fira Sans', sans-serif;
      background: white;
    }

    #calendar {
      max-width: 100%;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 0 0 12px 0;
      font-size: 0.95rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      display: inline-block;
    }

    .fc .fc-toolbar-title {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .fc-event {
      cursor: pointer;
      border: none !important;
      padding: 2px 4px;
    }

    .fc-daygrid-event-dot {
      display: none;
    }

    .details-panel {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      background: #fafafa;
      font-size: 0.95rem;
    }

    .details-panel h4 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.05rem;
    }

    .details-panel ul {
      margin-bottom: 0;
      padding-left: 18px;
    }

    .details-panel li {
      margin-bottom: 4px;
    }

    @media (max-width: 768px) {
      .fc .fc-toolbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }
  </style>

          const props = info.event.extendedProps;
          const title = info.event.title;
          const start = info.event.start ? info.event.start.toLocaleDateString() : '';
          const end = info.event.end
            ? new Date(info.event.end.getTime() - 86400000).toLocaleDateString()
            : start;

          let html = '<h4>' + title + '</h4>';
          html += '<p><b>Date:</b> ' + start;
          if (end && end !== start) {
            html += ' &ndash; ' + end;
          }
          html += '</p>';

          if (props.type) {
            html += '<p><b>Type:</b> ' + props.type + '</p>';
          }

          if (props.description) {
            html += '<p>' + props.description + '</p>';
          }

          if (props.items && props.items.length) {
            html += '<ul>';
            props.items.forEach(function(item) {
              if (item.url) {
                html += '<li><a href="' + item.url + '" target="_blank" rel="noopener noreferrer">' + item.label + '</a></li>';
              } else {
                html += '<li>' + item.label + '</li>';
              }
            });
            html += '</ul>';
          }

          detailsEl.innerHTML = html;

          if (info.event.url) {
            window.open(info.event.url, '_blank');
